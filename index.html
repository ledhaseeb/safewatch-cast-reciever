<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SafeWatch Cast Receiver</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #0f1923; }
    #player-container {
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
    }
    #youtube-player { width: 100%; height: 100%; }
    #idle-screen {
      position: fixed;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0f1923 0%, #1a2a3a 100%);
      z-index: 10;
    }
    #idle-screen.hidden { display: none; }
    .idle-title {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 72px;
      font-weight: 700;
      color: #2dd4a8;
      margin-bottom: 16px;
    }
    .idle-subtitle {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 28px;
      color: #94a3b8;
    }
    #loading-overlay {
      position: fixed;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.85);
      z-index: 20;
    }
    #loading-overlay.hidden { display: none; }
    .spinner {
      width: 48px; height: 48px;
      border: 4px solid rgba(255,255,255,0.2);
      border-top-color: #2dd4a8;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 24px;
      color: #fff;
      margin-top: 16px;
    }
  </style>
</head>
<body>
  <div id="idle-screen">
    <div class="idle-title">SafeWatch</div>
    <div class="idle-subtitle">Waiting for content...</div>
  </div>

  <div id="loading-overlay" class="hidden">
    <div class="spinner"></div>
    <div class="loading-text">Loading video...</div>
  </div>

  <div id="player-container">
    <div id="youtube-player"></div>
  </div>

  <script src="https://www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
  <script src="https://www.youtube.com/iframe_api"></script>
  <script>
    var NAMESPACE = 'urn:x-cast:com.safewatch.cast';

    var ytPlayer = null;
    var playlist = [];
    var currentIndex = 0;
    var isPlaying = false;
    var sessionActive = false;
    var statusInterval = null;
    var sessionStartTime = 0;
    var accumulatedPlaySeconds = 0;
    var lastPlayStartTime = 0;

    var castContext = cast.framework.CastReceiverContext.getInstance();
    var playerManager = castContext.getPlayerManager();

    function showIdle() {
      document.getElementById('idle-screen').classList.remove('hidden');
      document.getElementById('loading-overlay').classList.add('hidden');
    }

    function hideIdle() {
      document.getElementById('idle-screen').classList.add('hidden');
    }

    function showLoading() {
      document.getElementById('loading-overlay').classList.remove('hidden');
    }

    function hideLoading() {
      document.getElementById('loading-overlay').classList.add('hidden');
    }

    function getElapsedPlaySeconds() {
      var extra = 0;
      if (isPlaying && lastPlayStartTime > 0) {
        extra = Math.floor((Date.now() - lastPlayStartTime) / 1000);
      }
      return accumulatedPlaySeconds + extra;
    }

    function sendStatus() {
      if (!sessionActive) return;
      var message = {
        type: 'STATUS',
        currentIndex: currentIndex,
        isPlaying: isPlaying,
        totalVideos: playlist.length,
...
        case 'PLAY':
          if (ytPlayer && typeof ytPlayer.playVideo === 'function') {
            ytPlayer.playVideo();
          }
          break;

        case 'PAUSE':
          if (ytPlayer && typeof ytPlayer.pauseVideo === 'function') {
            ytPlayer.pauseVideo();
          }
          break;

        case 'SKIP':
          playVideo(currentIndex + 1);
          break;

        case 'SKIP_TO':
          playVideo(data.index || 0);
          break;

        case 'STOP':
          sessionActive = false;
          accumulatedPlaySeconds = 0;
          lastPlayStartTime = 0;
          if (statusInterval) {
            clearInterval(statusInterval);
            statusInterval = null;
          }
          if (ytPlayer && typeof ytPlayer.stopVideo === 'function') {
            ytPlayer.stopVideo();
          }
          showIdle();
          sendMessage({ type: 'SESSION_STOPPED' });
          break;

        default:
          console.log('Unknown message type:', data.type);
      }
    });

    var castOptions = new cast.framework.CastReceiverOptions();
    castOptions.disableIdleTimeout = true;
    castOptions.customNamespaces = {};
    castOptions.customNamespaces[NAMESPACE] = cast.framework.system.MessageType.JSON;

    castContext.start(castOptions);
    console.log('SafeWatch Cast Receiver started');
  </script>
</body>
</html>
