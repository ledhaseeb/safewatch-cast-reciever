<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SafeWatch Cast Receiver</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #0f1923; }
    #player-container {
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
    }
    #youtube-player { width: 100%; height: 100%; }
    #idle-screen {
      position: fixed;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0f1923 0%, #1a2a3a 100%);
      z-index: 10;
    }
    #idle-screen.hidden { display: none; }
    .idle-title {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 72px;
      font-weight: 700;
      color: #2dd4a8;
      margin-bottom: 16px;
    }
    .idle-subtitle {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 28px;
      color: #94a3b8;
    }
    #loading-overlay {
      position: fixed;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.85);
      z-index: 20;
    }
    #loading-overlay.hidden { display: none; }
    .spinner {
      width: 48px; height: 48px;
      border: 4px solid rgba(255,255,255,0.2);
      border-top-color: #2dd4a8;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 24px;
      color: #fff;
      margin-top: 16px;
    }
    #debug-log {
      position: fixed;
      bottom: 10px;
      left: 10px;
      right: 10px;
      max-height: 200px;
      overflow-y: auto;
      background: rgba(0,0,0,0.8);
      color: #2dd4a8;
      font-family: monospace;
      font-size: 14px;
      padding: 8px;
      border-radius: 4px;
      z-index: 100;
      white-space: pre-wrap;
      word-break: break-all;
    }
  </style>
</head>
<body>
  <div id="idle-screen">
    <div class="idle-title">KidSafeTV</div>
    <div class="idle-subtitle">Waiting for content...</div>
  </div>

  <div id="loading-overlay" class="hidden">
    <div class="spinner"></div>
    <div class="loading-text">Loading video...</div>
  </div>

  <div id="player-container">
    <div id="youtube-player"></div>
  </div>

  <div id="debug-log"></div>

  <script src="https://www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
  <script src="https://www.youtube.com/iframe_api"></script>
  <script>
    var NAMESPACE = 'urn:x-cast:com.safewatch.cast';

    var debugEl = document.getElementById('debug-log');
    var debugLines = [];
    function debugLog(msg) {
      var ts = new Date().toLocaleTimeString();
      var line = ts + ' ' + msg;
      console.log(line);
      debugLines.push(line);
      if (debugLines.length > 15) debugLines.shift();
      debugEl.textContent = debugLines.join('\n');
    }

    var ytPlayer = null;
    var ytReady = false;
    var playlist = [];
    var currentIndex = 0;
    var isPlaying = false;
    var sessionActive = false;
    var statusInterval = null;
    var sessionStartTime = 0;
    var accumulatedPlaySeconds = 0;
    var lastPlayStartTime = 0;
    var isTransitioning = false;
    var expectedVideoId = '';
    var playingConfirmed = false;

    debugLog('Receiver loading...');

    var castContext = cast.framework.CastReceiverContext.getInstance();
    var playerManager = castContext.getPlayerManager();

    debugLog('Cast context created, namespace: ' + NAMESPACE);

    function showIdle() {
      document.getElementById('idle-screen').classList.remove('hidden');
      document.getElementById('loading-overlay').classList.add('hidden');
    }

    function hideIdle() {
      document.getElementById('idle-screen').classList.add('hidden');
    }

    function showLoading() {
      document.getElementById('loading-overlay').classList.remove('hidden');
    }

    function hideLoading() {
      document.getElementById('loading-overlay').classList.add('hidden');
    }

    function getElapsedPlaySeconds() {
      var extra = 0;
      if (isPlaying && lastPlayStartTime > 0) {
        extra = Math.floor((Date.now() - lastPlayStartTime) / 1000);
      }
      return accumulatedPlaySeconds + extra;
    }

    function sendStatus() {
      if (!sessionActive) return;
      var currentTime = 0;
      var duration = 0;
      if (ytPlayer && typeof ytPlayer.getCurrentTime === 'function') {
        currentTime = Math.floor(ytPlayer.getCurrentTime());
        duration = Math.floor(ytPlayer.getDuration());
      }
      var message = {
        type: 'STATUS',
        currentIndex: currentIndex,
        isPlaying: isPlaying,
        totalVideos: playlist.length,
        currentVideoTitle: playlist[currentIndex] ? playlist[currentIndex].title : '',
        currentVideoId: playlist[currentIndex] ? (playlist[currentIndex].youtubeId || '') : '',
        elapsedSeconds: getElapsedPlaySeconds(),
        videoCurrentTime: currentTime,
        videoDuration: duration
      };
      try {
        castContext.sendCustomMessage(NAMESPACE, undefined, message);
      } catch (e) {
        debugLog('Status send error: ' + e);
      }
    }

    function playVideo(index) {
      if (index < 0 || index >= playlist.length) {
        debugLog('Playlist complete, all videos played');
        sendMessage({ type: 'SESSION_COMPLETE' });
        sessionActive = false;
        showIdle();
        return;
      }

      isTransitioning = true;
      playingConfirmed = false;
      currentIndex = index;
      var video = playlist[currentIndex];
      var videoId = video.youtubeId || '';
      expectedVideoId = videoId;

      debugLog('Playing video ' + (index+1) + '/' + playlist.length + ': ' + videoId + ' - ' + (video.title || ''));

      if (!videoId) {
        debugLog('No video ID for index ' + index + ', skipping');
        isTransitioning = false;
        playVideo(index + 1);
        return;
      }

      showLoading();
      hideIdle();

      if (ytPlayer && ytReady && typeof ytPlayer.loadVideoById === 'function') {
        debugLog('Loading video via YT API: ' + videoId);
        ytPlayer.loadVideoById(videoId);
      } else {
        debugLog('YT player not ready yet, waiting...');
        isTransitioning = false;
      }

      sendStatus();
    }

    function sendMessage(message) {
      try {
        castContext.sendCustomMessage(NAMESPACE, undefined, message);
      } catch (e) {
        debugLog('Send error: ' + e);
      }
    }

    function onYTPlayerReady() {
      ytReady = true;
      debugLog('YouTube player ready');
      hideLoading();
    }

    function onYTPlayerStateChange(event) {
      var stateNames = {
        '-1': 'unstarted',
        '0': 'ended',
        '1': 'playing',
        '2': 'paused',
        '3': 'buffering',
        '5': 'cued'
      };
      var currentYtVideoUrl = '';
      try {
        if (ytPlayer && typeof ytPlayer.getVideoUrl === 'function') {
          currentYtVideoUrl = ytPlayer.getVideoUrl() || '';
        }
      } catch(e) {}
      debugLog('YT state: ' + (stateNames[event.data] || event.data) + ' (expected=' + expectedVideoId + ', confirmed=' + playingConfirmed + ')');

      if (event.data === YT.PlayerState.PLAYING) {
        isPlaying = true;
        isTransitioning = false;
        playingConfirmed = true;
        lastPlayStartTime = Date.now();
        hideLoading();
        sendStatus();
      } else if (event.data === YT.PlayerState.PAUSED) {
        if (isTransitioning) return;
        if (isPlaying && lastPlayStartTime > 0) {
          accumulatedPlaySeconds += Math.floor((Date.now() - lastPlayStartTime) / 1000);
          lastPlayStartTime = 0;
        }
        isPlaying = false;
        sendStatus();
      } else if (event.data === YT.PlayerState.ENDED) {
        if (!playingConfirmed) {
          debugLog('Ignoring ENDED — current video never confirmed playing');
          return;
        }
        var endedForExpected = currentYtVideoUrl.indexOf(expectedVideoId) !== -1;
        if (!endedForExpected && expectedVideoId) {
          debugLog('Ignoring ENDED — video URL does not match expected ID');
          return;
        }
        if (isPlaying && lastPlayStartTime > 0) {
          accumulatedPlaySeconds += Math.floor((Date.now() - lastPlayStartTime) / 1000);
          lastPlayStartTime = 0;
        }
        isPlaying = false;
        playingConfirmed = false;
        debugLog('Video ended, advancing from index ' + currentIndex + ' to ' + (currentIndex + 1));
        sendMessage({ type: 'VIDEO_ENDED', index: currentIndex });
        playVideo(currentIndex + 1);
      } else if (event.data === YT.PlayerState.BUFFERING) {
        showLoading();
      }
    }

    function onYTPlayerError(event) {
      debugLog('YT error: ' + event.data + ' for video index ' + currentIndex);
      isTransitioning = false;
      sendMessage({
        type: 'VIDEO_ERROR',
        index: currentIndex,
        error: event.data,
        title: playlist[currentIndex] ? playlist[currentIndex].title : ''
      });
      playVideo(currentIndex + 1);
    }

    window.onYouTubeIframeAPIReady = function() {
      debugLog('YT IFrame API ready, creating player...');
      ytPlayer = new YT.Player('youtube-player', {
        width: '100%',
        height: '100%',
        playerVars: {
          autoplay: 1,
          controls: 0,
          modestbranding: 1,
          rel: 0,
          showinfo: 0,
          iv_load_policy: 3,
          fs: 0,
          disablekb: 1,
          playsinline: 0
        },
        events: {
          onReady: onYTPlayerReady,
          onStateChange: onYTPlayerStateChange,
          onError: onYTPlayerError
        }
      });
    };

    castContext.addCustomMessageListener(NAMESPACE, function(event) {
      debugLog('MSG received: ' + JSON.stringify(event.data).substring(0, 200));
      var data = event.data;

      switch (data.type) {
        case 'LOAD_PLAYLIST':
          playlist = data.playlist || [];
          currentIndex = data.startIndex || 0;
          sessionActive = true;
          sessionStartTime = Date.now();
          accumulatedPlaySeconds = 0;
          lastPlayStartTime = 0;
          isTransitioning = false;

          debugLog('Playlist loaded: ' + playlist.length + ' videos, starting at ' + currentIndex);
          hideIdle();

          if (statusInterval) clearInterval(statusInterval);
          statusInterval = setInterval(sendStatus, 3000);

          if (ytPlayer && ytReady && typeof ytPlayer.loadVideoById === 'function') {
            playVideo(currentIndex);
          } else {
            debugLog('Waiting for YT player to be ready...');
            var checkReady = setInterval(function() {
              if (ytPlayer && ytReady && typeof ytPlayer.loadVideoById === 'function') {
                clearInterval(checkReady);
                debugLog('YT player now ready, starting playback');
                playVideo(currentIndex);
              }
            }, 200);
          }
          break;

        case 'PLAY':
          if (ytPlayer && typeof ytPlayer.playVideo === 'function') {
            ytPlayer.playVideo();
          }
          break;

        case 'PAUSE':
          if (ytPlayer && typeof ytPlayer.pauseVideo === 'function') {
            ytPlayer.pauseVideo();
          }
          break;

        case 'SKIP':
          debugLog('SKIP received, current index: ' + currentIndex);
          isTransitioning = false;
          playVideo(currentIndex + 1);
          break;

        case 'SKIP_TO':
          debugLog('SKIP_TO received, target index: ' + data.index);
          isTransitioning = false;
          playVideo(data.index || 0);
          break;

        case 'SEEK_FORWARD':
          if (ytPlayer && typeof ytPlayer.getCurrentTime === 'function') {
            var newTime = ytPlayer.getCurrentTime() + (data.seconds || 10);
            var dur = ytPlayer.getDuration();
            if (dur > 0 && newTime > dur - 1) newTime = Math.max(0, dur - 1);
            if (newTime >= 0) {
              ytPlayer.seekTo(newTime, true);
              debugLog('Seek forward to ' + Math.floor(newTime) + 's');
            }
          }
          break;

        case 'SEEK_BACKWARD':
          if (ytPlayer && typeof ytPlayer.getCurrentTime === 'function') {
            var backTime = ytPlayer.getCurrentTime() - (data.seconds || 10);
            if (backTime < 0) backTime = 0;
            ytPlayer.seekTo(backTime, true);
            debugLog('Seek backward to ' + Math.floor(backTime) + 's');
          }
          break;

        case 'SEEK_TO':
          if (ytPlayer && typeof ytPlayer.seekTo === 'function') {
            ytPlayer.seekTo(data.position || 0, true);
            debugLog('Seek to ' + Math.floor(data.position) + 's');
          }
          break;

        case 'SET_VOLUME':
          if (ytPlayer && typeof ytPlayer.setVolume === 'function') {
            var vol = Math.max(0, Math.min(100, data.volume != null ? data.volume : 50));
            ytPlayer.setVolume(vol);
            debugLog('Volume set to ' + vol);
          }
          break;

        case 'STOP':
          sessionActive = false;
          accumulatedPlaySeconds = 0;
          lastPlayStartTime = 0;
          isTransitioning = false;
          if (statusInterval) {
            clearInterval(statusInterval);
            statusInterval = null;
          }
          if (ytPlayer && typeof ytPlayer.stopVideo === 'function') {
            ytPlayer.stopVideo();
          }
          showIdle();
          sendMessage({ type: 'SESSION_STOPPED' });
          break;

        default:
          debugLog('Unknown message type: ' + data.type);
      }
    });

    var castOptions = new cast.framework.CastReceiverOptions();
    castOptions.disableIdleTimeout = true;
    castOptions.customNamespaces = {};
    castOptions.customNamespaces[NAMESPACE] = cast.framework.system.MessageType.JSON;

    castContext.start(castOptions);
    debugLog('Cast receiver started, waiting for sender...');
  </script>
</body>
</html>
